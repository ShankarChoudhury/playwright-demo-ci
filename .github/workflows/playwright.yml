name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run the tests'
        required: false
        type: choice
        default: 'chromium'
        options:
          - chromium
          - firefox
          - webkit
          - 'Microsoft Edge'
          - ''
      build_version:
        description: 'Version tag to deploy'
        required: false
        default: 'v1.0.0'
        type: string

      tag:
        description: 'Test tag to run'
        required: false
        default: ''
        type: string  

  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        shell: bash
        run: |
          BROWSER="${{ github.event.inputs.browser || 'chromium' }}"
          TAG="${{ github.event.inputs.tag || '' }}"

          echo "Playwright tests started for browser: $BROWSER"

          if [ -n "$TAG" ]; then
            echo "Running tests with tag: $TAG"
            npx playwright test orangespecs --project="$BROWSER" --grep "$TAG"
          else
            echo "No tag provided. Running all tests."
            npx playwright test orangespecs --project="$BROWSER"
          fi
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 15
